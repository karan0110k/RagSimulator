<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniRAG - Enterprise AI Assistant</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-cube logo-icon"></i>
                <h1>RAGSIMULATOR <span class="badge-enterprise"></span></h1>
            </div>
            <div class="header-actions">
                <!-- Future user profile or settings could go here -->
                <button class="icon-button"><i class="fa-solid fa-gear"></i></button>
            </div>
        </header>

        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-file-arrow-up"></i> Knowledge Base</h2>
                    <p class="subtitle">Upload a document to provide context for the AI.</p>
                </div>

                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" class="file-input" hidden>
                    <div class="upload-placeholder">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <p><strong>Click to browse</strong> or drag & drop a file here</p>
                        <p class="text-sm text-muted">Supports PDF, TXT, DOCX</p>
                    </div>
                    <button class="btn btn-primary btn-upload"
                        onclick="document.getElementById('fileInput').click()">Select File</button>
                    <button class="btn btn-secondary btn-submit" id="submitUploadBtn" onclick="uploadFile()"
                        style="display: none;">Upload to KB</button>
                </div>
                <div id="uploadStatus" class="status-message"></div>
            </section>

            <!-- Chat Section -->
            <section class="chat-section card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-message"></i> Assistant</h2>
                    <p class="subtitle">Ask questions based on your uploaded knowledge base.</p>
                </div>

                <div id="chatHistory" class="chat-history">
                    <div class="chat-message ai-message welcome-message">
                        <div class="avatar ai-avatar"><i class="fa-solid fa-robot"></i></div>
                        <div class="message-content">
                            Hello! I'm OmniRAG. Upload a document and ask me anything about it.
                        </div>
                    </div>
                </div>

                <div id="loading" class="loading-indicator hidden">
                    <div class="dot-typing"></div>
                    <span style="margin-left: 20px;">AI is thinking...</span>
                </div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea id="query" placeholder="Ask your question here..." rows="1"
                            oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                        <button class="btn btn-icon btn-send" onclick="askQuestion()" title="Send message">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // File input UX
        const fileInput = document.getElementById("fileInput");
        const uploadArea = document.getElementById("uploadArea");
        const submitUploadBtn = document.getElementById("submitUploadBtn");

        fileInput.addEventListener('change', function () {
            if (this.files && this.files.length > 0) {
                const fileName = this.files[0].name;
                uploadArea.querySelector('.upload-placeholder p strong').innerText = fileName;
                submitUploadBtn.style.display = 'inline-flex';
            }
        });

        async function uploadFile() {
            const file = fileInput.files[0];

            if (!file) {
                showStatus("Please select a file first.", "error");
                return;
            }

            submitUploadBtn.disabled = true;
            submitUploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';
            // Clear previous metadata
            document.getElementById("uploadStatus").innerHTML = '';

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("/api/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(data.message || "File uploaded successfully!", "success", data);
                } else {
                    showStatus(data.error || "Upload failed.", "error");
                }
            } catch (e) {
                showStatus("Network error occurred during upload.", "error");
            } finally {
                submitUploadBtn.disabled = false;
                submitUploadBtn.innerHTML = 'Upload to KB';
            }
        }

        function showStatus(message, type, meta = null) {
            const statusEl = document.getElementById("uploadStatus");

            let html = `<div class="status-alert status-${type}">
            <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'}"></i> ${message}
        </div>`;

            // Append metadata if available and upload was successful
            if (type === 'success' && meta) {
                html += `<div class="metadata-card">
                <h4><i class="fa-solid fa-database"></i> Knowledge Base Updated</h4>
                <ul class="metadata-list">
                    <li><strong>File Type:</strong> ${meta.type ? meta.type.toUpperCase() : 'Unknown'}</li>
                    ${meta.text_length !== undefined ? `<li><strong>Characters Extracted:</strong> ${meta.text_length}</li>` : ''}
                    ${meta.images_found !== undefined ? `<li><strong>Images Found & Analyzed:</strong> ${meta.images_found}</li>` : ''}
                    ${meta.chunks_created !== undefined ? `<li><strong>Vector Chunks Created:</strong> ${meta.chunks_created}</li>` : ''}
                </ul>
            </div>`;
            }

            statusEl.innerHTML = html;

            // Only auto-hide errors, keep metadata visible for successful uploads
            if (type === 'error') {
                setTimeout(() => {
                    statusEl.innerHTML = '';
                }, 5000);
            }
        }

        async function askQuestion() {
            const queryBox = document.getElementById("query");
            const query = queryBox.value.trim();

            if (!query) return;

            // Reset input height
            queryBox.style.height = 'auto';

            const chatDiv = document.getElementById("chatHistory");

            // Add User Message
            appendMessage('user', query);

            queryBox.value = "";

            // Show Loading
            document.getElementById("loading").classList.remove("hidden");
            scrollToBottom();

            try {
                const response = await fetch("/api/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                document.getElementById("loading").classList.add("hidden");

                if (response.ok) {
                    appendMessage('ai', data.answer, data.model, data.confidence);
                } else {
                    appendMessage('ai', "Sorry, an error occurred: " + (data.error || "Unknown error"));
                }

            } catch (e) {
                document.getElementById("loading").classList.add("hidden");
                appendMessage('ai', "Network error: Could not reach the server.");
            }
        }

        function appendMessage(sender, text, model = null, confidence = null) {
            const chatDiv = document.getElementById("chatHistory");

            const msgDiv = document.createElement("div");
            msgDiv.className = `chat-message ${sender}-message`;

            let innerHTML = '';

            if (sender === 'ai') {
                innerHTML += `
                <div class="avatar ai-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-content">
                    <div class="text">${text.replace(/\\n/g, '<br>')}</div>
            `;

                if (model) {
                    innerHTML += `
                    <div class="meta-info">
                        <span class="badge-model"><i class="fa-solid fa-microchip"></i> ${model}</span>
                        ${confidence ? `<span class="confidence">Confidence: ${confidence}</span>` : ''}
                    </div>
                `;
                }
                innerHTML += `</div>`; // close message-content
            } else {
                innerHTML += `
                <div class="message-content">
                    <div class="text">${text}</div>
                </div>
                <div class="avatar user-avatar"><i class="fa-solid fa-user"></i></div>
            `;
            }

            msgDiv.innerHTML = innerHTML;
            chatDiv.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatDiv = document.getElementById("chatHistory");
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Support Enter key to send (Shift+Enter for newline)
        document.getElementById("query").addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        });

    </script>
</body>

</html>
